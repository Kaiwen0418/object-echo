name: supabase-production

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-production.yml"

jobs:
  deploy-production-db:
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.PRODUCTION_PROJECT_ID != '' && secrets.PRODUCTION_DB_PASSWORD != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$PRODUCTION_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRODUCTION_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}

      - name: Push production migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}

      - name: Notes
        run: echo "TODO: add production-safe database checks before irreversible migrations."
